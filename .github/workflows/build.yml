name: Test and Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'main'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GLS_OCTOCAT_TOKEN }}
          submodules: true

      - name: Checkout repo
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version-file: .github/.java-version

      - name: Update formats
        if: github.event_name == 'pull_request'
        run: ./gradlew :YamlConverter:run

      - name: Add address format changes
        id: update_format
        if: github.event_name == 'pull_request'
        uses: EndBug/add-and-commit@v9.1.4
        with:
          author_name: 'gls-octocat'
          author_email: 'github@gls-ecl.com'
          message: 'Update address formats'

      - name: Fail on updated
        if: steps.update_format.outputs.committed == 'true'
        run: exit 1

      - name: Test and Build
        run: ./gradlew build

      - name: Generate coverage reports
        run: ./gradlew koverXmlReport

      - name: Test Publication
        run: ./gradlew publishToMavenLocal

      - name: Calculate coverage
        id: coverage
        run: |
          covered=$(find . -path "*/build/reports/kover/*.xml" -type f \
            -exec yq -p=xml -oy '.report.counter[] | select(."+@type" == "INSTRUCTION") | ."+@covered"' {} \; \
            | awk '{sum+=$1} END {print sum+0}')
          missed=$(find . -path "*/build/reports/kover/*.xml" -type f \
            -exec yq -p=xml -oy '.report.counter[] | select(."+@type" == "INSTRUCTION") | ."+@missed"' {} \; \
            | awk '{sum+=$1} END {print sum+0}')
          total=$((covered + missed))
          percentage=$([ "$total" -gt 0 ] && echo "$((covered * 100 / total))" || echo "0")
          echo "percent=${percent}" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${percent}% (${covered}/${total} instructions)"

      - name: Update coverage badge
        # TODO enable again after testing
        # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.COVERAGE_BADGE_GIST_ID }}
          filename: address-formatter-kotlin-coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.percent }}%
          valColorRange: ${{ steps.coverage.outputs.percent }}
          maxColorRange: 90
          minColorRange: 50
